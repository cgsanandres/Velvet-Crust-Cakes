
<!DOCTYPE html>
<html>
<head>

<title>Velvet Crust Cakes | Create Account</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
font-family:Arial;
box-sizing:border-box;
}

body{
margin:0;
background:#FFF8F2;
color:#6B3E2E;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CONTAINER */

.container{
width:420px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

/* TITLE */

h1{
text-align:center;
color:#6B3E2E;
margin-bottom:10px;
}

.subtitle{
text-align:center;
font-size:14px;
margin-bottom:25px;
color:#8b5a4c;
}

/* INPUTS */

label{
font-weight:bold;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin:8px 0 18px 0;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
background:#D8A47F;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#c48e6c;
}

/* LOGIN LINK */

.login-link{
text-align:center;
margin-top:18px;
font-size:14px;
}

.login-link a{
color:#D8A47F;
text-decoration:none;
font-weight:bold;
}

.login-link a:hover{
text-decoration:underline;
}

/* ERROR */

#error{
color:red;
font-size:13px;
margin-bottom:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Create Account</h1>
<p class="subtitle">
Join Velvet Crust Cakes and enjoy easier ordering,
exclusive bakery updates, and personalized cake recommendations.
</p>

<div id="error"></div>

<form onsubmit="createAccount(event)">

<label>Full Name</label>
<input type="text" id="name" required>

<label>Email Address</label>
<input type="email" id="email" required>

<label>Password</label>
<input type="password" id="password" required>

<label>Confirm Password</label>
<input type="password" id="confirm" required>

<button>Create Account</button>

</form>

<div class="login-link">
Already have an account?  
<a href="velvetlogin.html">Login here</a>
</div>

</div>

<script>

function createAccount(event){

event.preventDefault();

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
let confirm=document.getElementById("confirm").value;
let error=document.getElementById("error");

error.innerText="";

/* PASSWORD CHECK */

if(password!==confirm){
error.innerText="Passwords do not match.";
return;
}

/* SAVE ACCOUNT */

localStorage.setItem("velvetName",name);
localStorage.setItem("velvetEmail",email);
localStorage.setItem("velvetPassword",password);

/* SUCCESS */

alert("Account successfully created! You may now log in.");

window.location.href="velvetlogin.html";

}

</script>

</body>
</html>
