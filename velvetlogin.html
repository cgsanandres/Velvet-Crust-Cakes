<!DOCTYPE html>
<html>
<head>

<title>Velvet Crust Cakes | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
font-family:Arial;
box-sizing:border-box;
}

body{
margin:0;
background:#FFF8F2;
color:#6B3E2E;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* LOGIN CONTAINER */

.container{
width:420px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

/* TITLE */

h1{
text-align:center;
color:#6B3E2E;
margin-bottom:10px;
}

.subtitle{
text-align:center;
font-size:14px;
margin-bottom:25px;
color:#8b5a4c;
}

/* INPUTS */

label{
font-weight:bold;
font-size:14px;
}

input{
width:100%;
padding:12px;
margin:8px 0 18px 0;
border-radius:6px;
border:1px solid #ddd;
font-size:14px;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
background:#D8A47F;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#c48e6c;
}

/* CREATE ACCOUNT LINK */

.create-link{
text-align:center;
margin-top:18px;
font-size:14px;
}

.create-link a{
color:#D8A47F;
text-decoration:none;
font-weight:bold;
}

.create-link a:hover{
text-decoration:underline;
}

/* ERROR MESSAGE */

#error{
color:red;
font-size:13px;
margin-bottom:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>Welcome Back</h1>

<p class="subtitle">
Log in to your Velvet Crust Cakes account to place orders,
track purchases, and explore our delicious bakery menu.
</p>

<div id="error"></div>

<form onsubmit="loginUser(event)">

<label>Email Address</label>
<input type="email" id="email" required>

<label>Password</label>
<input type="password" id="password" required>

<button>Login</button>

</form>

<div class="create-link">
Don't have an account?  
<a href="createvelvacc.html">Create one here</a>
</div>

</div>

<script>

function loginUser(event){

event.preventDefault();

let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
let error=document.getElementById("error");

/* STORED ACCOUNT */

let savedEmail=localStorage.getItem("velvetEmail");
let savedPassword=localStorage.getItem("velvetPassword");

/* LOGIN CHECK */

if(email===savedEmail && password===savedPassword){

localStorage.setItem("velvetLoggedIn","true");

window.location.href="velvetindex.html";

}

else{

error.innerText="Incorrect email or password.";

}

}

</script>

</body>
</html>
